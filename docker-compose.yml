services:
  youtube-transcript-mcp:
    image: ghcr.io/lucasliet/youtube-transcript-mcp:latest
    # Para build local em vez de puxar do GHCR:
    # build: .
    container_name: youtube-transcript-mcp
    ports:
      - "7495:8000"
    restart: unless-stopped
    # Endpoints disponíveis (espelham o deploy do Deno Deploy):
    #   MCP (Streamable HTTP): http://localhost:7495/mcp
    #   REST pura:             http://localhost:7495/transcript?videoUrl=<url>
    #   Health:                http://localhost:7495/health
